server {
    listen 80;

    # Reverse-proxy API calls to the backend service on the compose network.
    # The TRAILING SLASH on proxy_pass is load-bearing: it strips the /api
    # prefix, so /api/grid/15 is forwarded to the backend as /grid/15 — exactly
    # what the Vite dev proxy does, so dev and prod behave identically.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the built single-page app. try_files falls back to index.html so a
    # browser refresh on any path still serves the app instead of a 404.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

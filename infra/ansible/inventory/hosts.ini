# Homelab IPAM — Ansible inventory
# K3s/Vault VMs from Phase 6 (700-703); ipam-db from Phase 8 (704).
# All reached over Tailscale.

[k3s_server]
k3s-server ansible_host=10.10.14.100

[k3s_agents]
k3s-agent-1 ansible_host=10.10.14.101
k3s-agent-2 ansible_host=10.10.14.102

[vault]
vault-1 ansible_host=10.10.14.103

[database]
ipam-db ansible_host=10.10.14.110

# Connection settings applied to every host above.
[all:vars]
ansible_user=firdaus
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
